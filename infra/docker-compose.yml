name: mcp-ops-studio

x-app-environment: &app-environment
  NODE_ENV: ${NODE_ENV:-development}
  DATABASE_URL: ${DATABASE_URL:-postgresql://mcpops:mcpops_dev_password@postgres:5432/mcp_ops_studio?schema=public}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  MCP_OPS_MASTER_KEY: ${MCP_OPS_MASTER_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
  SESSION_SECRET: ${SESSION_SECRET:-replace-with-at-least-32-random-characters}
  CSRF_SECRET: ${CSRF_SECRET:-replace-with-at-least-32-random-characters}
  PUBLIC_CONTROL_PLANE_URL: ${PUBLIC_CONTROL_PLANE_URL:-http://localhost:8080}
  PUBLIC_RUNTIME_URL: ${PUBLIC_RUNTIME_URL:-http://localhost:8080}
  SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@acme.test}
  SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-ChangeMe123!}
  SEED_MCP_API_KEY: ${SEED_MCP_API_KEY:-dev-acme-mcp-key}
  SEED_PRODUCTION_MCP_API_KEY: ${SEED_PRODUCTION_MCP_API_KEY:-prod-acme-mcp-key}
  PRODUCTION_RUNTIME_PUBLIC_URL: ${PRODUCTION_RUNTIME_PUBLIC_URL:-http://localhost:8080}
  RUNTIME_INTERNAL_URL: ${RUNTIME_INTERNAL_URL:-http://worker:8080}
  API_INTERNAL_URL: ${API_INTERNAL_URL:-http://127.0.0.1:3001}
  INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-token-change-me}
  MCP_OPS_DEMO_MODE: ${MCP_OPS_DEMO_MODE:-false}
  MOCK_CRM_URL: ${MOCK_CRM_URL:-}
  ENABLE_JWT_AUTH: ${ENABLE_JWT_AUTH:-false}
  ENABLE_ENTRA_AUTH: ${ENABLE_ENTRA_AUTH:-false}
  ENABLE_REVIEWED_DB_QUERIES: ${ENABLE_REVIEWED_DB_QUERIES:-false}
  EXECUTOR_PROVIDER: ${EXECUTOR_PROVIDER:-local}
  RUNTIME_CONCURRENCY: ${RUNTIME_CONCURRENCY:-40}
  DEPLOYMENT_CONCURRENCY: ${DEPLOYMENT_CONCURRENCY:-2}

x-app-build: &app-build
  context: ..
  dockerfile: infra/docker/Dockerfile

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mcp_ops_studio}
      # The official image requires its bootstrap role to remain a superuser.
      # Application services use the separate least-privilege role below.
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-postgres_dev_password}
      MCP_OPS_DB_USER: ${POSTGRES_USER:-mcpops}
      MCP_OPS_DB_PASSWORD: ${POSTGRES_PASSWORD:-mcpops_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--maxmemory-policy",
        "noeviction",
      ]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  migrate:
    build:
      <<: *app-build
      args:
        APP: migrate
    environment: *app-environment
    command:
      [
        "sh",
        "-c",
        "pnpm config:validate && pnpm --filter @mcpops/db migrate && pnpm --filter @mcpops/db seed",
      ]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  control-plane:
    build:
      <<: *app-build
      args:
        APP: control-plane
        API_INTERNAL_URL: http://127.0.0.1:3001
    environment:
      <<: *app-environment
      API_PORT: 3001
      PORT: 3001
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      NEXT_PUBLIC_DOCS_URL: ${NEXT_PUBLIC_DOCS_URL:-https://fabian-arnold.github.io/McpOpsStudio/}
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      worker:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3001/health >/dev/null && wget -qO- http://127.0.0.1:3000/ >/dev/null && wget -qO- http://127.0.0.1:8080/ready >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  worker:
    build:
      <<: *app-build
      args:
        APP: worker
    environment:
      <<: *app-environment
      PORT: 8080
      REQUIRE_INTERNAL_PROXY_AUTH: "true"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      mock-crm:
        condition: service_healthy
        required: false
    expose:
      - "8080"
    healthcheck:
      # Alpine resolves localhost to ::1 first, while Node listens on IPv4.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/ready"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  mock-crm:
    image: node:22-alpine
    profiles: ["demo"]
    environment:
      # Starting the explicit demo profile is itself the operator opt-in.
      MCP_OPS_DEMO_MODE: "true"
    working_dir: /app
    command: ["node", "server.mjs"]
    volumes:
      - ./mock-crm/server.mjs:/app/server.mjs:ro
    expose:
      - "8090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/health"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

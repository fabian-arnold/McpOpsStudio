name: mcp-ops-studio

x-app-environment: &app-environment
  NODE_ENV: production
  MCP_OPS_INSTALL_MODE: browser
  REDIS_URL: redis://redis:6379
  COOKIE_SECURE: "true"
  RUNTIME_INTERNAL_URL: http://worker:8080
  API_INTERNAL_URL: http://127.0.0.1:3001
  EXECUTOR_PROVIDER: local
  RUNTIME_CONCURRENCY: ${RUNTIME_CONCURRENCY:-40}
  DEPLOYMENT_CONCURRENCY: ${DEPLOYMENT_CONCURRENCY:-2}
  LOG_LEVEL: ${LOG_LEVEL:-info}

x-generated-config: &generated-config
  mcpops-config:
    condition: service_completed_successfully

x-app-volumes: &app-volumes
  - mcpops-config:/var/lib/mcpops-config:ro

services:
  mcpops-config:
    image: ghcr.io/fabian-arnold/mcpopsstudio-migrate:__MCP_OPS_VERSION__
    pull_policy: always
    command: ["node", "scripts/generate-install-config.mjs", "/var/lib/mcpops-config"]
    volumes:
      - mcpops-config:/var/lib/mcpops-config
    restart: "no"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mcp_ops_studio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /docker-entrypoint-initdb.d/postgres-admin-password
      MCP_OPS_DB_USER: mcpops
      MCP_OPS_DB_PASSWORD_FILE: /docker-entrypoint-initdb.d/postgres-app-password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - mcpops-config:/docker-entrypoint-initdb.d:ro
    depends_on: *generated-config
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mcp_ops_studio"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  migrate:
    image: ghcr.io/fabian-arnold/mcpopsstudio-migrate:__MCP_OPS_VERSION__
    pull_policy: always
    environment: *app-environment
    volumes: *app-volumes
    command: ["sh", "-c", "pnpm config:validate && pnpm --filter @mcpops/db migrate"]
    depends_on:
      <<: *generated-config
      postgres:
        condition: service_healthy
    restart: "no"

  worker:
    image: ghcr.io/fabian-arnold/mcpopsstudio-worker:__MCP_OPS_VERSION__
    pull_policy: always
    environment:
      <<: *app-environment
      PORT: 8080
      REQUIRE_INTERNAL_PROXY_AUTH: "true"
    volumes: *app-volumes
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/ready"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  control-plane:
    image: ghcr.io/fabian-arnold/mcpopsstudio-control-plane:__MCP_OPS_VERSION__
    pull_policy: always
    environment:
      <<: *app-environment
      API_PORT: 3001
      PORT: 3001
      NEXT_PUBLIC_API_URL: /api
    volumes: *app-volumes
    ports:
      - "${MCP_OPS_BIND_ADDRESS:-127.0.0.1}:${MCP_OPS_PORT:-8080}:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health >/dev/null && wget -qO- http://127.0.0.1:3000/ >/dev/null && wget -qO- http://127.0.0.1:8080/ready >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  mcpops-config:
  postgres-data:
  redis-data:

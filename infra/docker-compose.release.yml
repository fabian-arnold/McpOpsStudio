name: mcp-ops-studio

x-app-environment: &app-environment
  NODE_ENV: production
  DATABASE_URL: postgresql://${POSTGRES_USER:-mcpops}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mcp_ops_studio}?schema=public
  REDIS_URL: redis://redis:6379
  MCP_OPS_MASTER_KEY: ${MCP_OPS_MASTER_KEY:?Set MCP_OPS_MASTER_KEY}
  SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET}
  CSRF_SECRET: ${CSRF_SECRET:?Set CSRF_SECRET}
  COOKIE_SECURE: "true"
  WEB_ORIGIN: ${PUBLIC_CONTROL_PLANE_URL:?Set PUBLIC_CONTROL_PLANE_URL}
  PUBLIC_CONTROL_PLANE_URL: ${PUBLIC_CONTROL_PLANE_URL}
  PUBLIC_RUNTIME_URL: ${PUBLIC_RUNTIME_URL:?Set PUBLIC_RUNTIME_URL}
  PRODUCTION_RUNTIME_PUBLIC_URL: ${PUBLIC_RUNTIME_URL}
  RUNTIME_INTERNAL_URL: http://worker:8080
  API_INTERNAL_URL: http://127.0.0.1:3001
  INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?Set INTERNAL_API_TOKEN}
  SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:?Set SEED_ADMIN_EMAIL}
  SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?Set SEED_ADMIN_PASSWORD}
  SEED_MCP_API_KEY: ${SEED_MCP_API_KEY:?Set SEED_MCP_API_KEY}
  SEED_PRODUCTION_MCP_API_KEY: ${SEED_PRODUCTION_MCP_API_KEY:?Set SEED_PRODUCTION_MCP_API_KEY}
  MCP_OPS_DEMO_MODE: "false"
  ENABLE_JWT_AUTH: ${ENABLE_JWT_AUTH:-false}
  ENABLE_ENTRA_AUTH: ${ENABLE_ENTRA_AUTH:-false}
  ENABLE_REVIEWED_DB_QUERIES: ${ENABLE_REVIEWED_DB_QUERIES:-false}
  EXECUTOR_PROVIDER: ${EXECUTOR_PROVIDER:-local}
  RUNTIME_CONCURRENCY: ${RUNTIME_CONCURRENCY:-40}
  DEPLOYMENT_CONCURRENCY: ${DEPLOYMENT_CONCURRENCY:-2}
  LOG_LEVEL: ${LOG_LEVEL:-info}

x-image: &image
  pull_policy: always

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mcp_ops_studio}
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:?Set POSTGRES_ADMIN_PASSWORD}
      MCP_OPS_DB_USER: ${POSTGRES_USER:-mcpops}
      MCP_OPS_DB_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init/00-security.sh:/docker-entrypoint-initdb.d/00-security.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  migrate:
    <<: *image
    image: ghcr.io/fabian-arnold/mcpopsstudio-migrate:${MCP_OPS_VERSION:?Set MCP_OPS_VERSION to a release tag}
    environment: *app-environment
    command: ["sh", "-c", "pnpm config:validate && pnpm --filter @mcpops/db migrate && pnpm --filter @mcpops/db seed"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  worker:
    <<: *image
    image: ghcr.io/fabian-arnold/mcpopsstudio-worker:${MCP_OPS_VERSION}
    environment:
      <<: *app-environment
      PORT: 8080
      REQUIRE_INTERNAL_PROXY_AUTH: "true"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/ready"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  control-plane:
    <<: *image
    image: ghcr.io/fabian-arnold/mcpopsstudio-control-plane:${MCP_OPS_VERSION}
    environment:
      <<: *app-environment
      API_PORT: 3001
      PORT: 3001
      NEXT_PUBLIC_API_URL: /api
    ports:
      - "${MCP_OPS_BIND_ADDRESS:-127.0.0.1}:${MCP_OPS_PORT:-8080}:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health >/dev/null && wget -qO- http://127.0.0.1:3000/ >/dev/null && wget -qO- http://127.0.0.1:8080/ready >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

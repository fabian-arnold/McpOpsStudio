packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  argon2: true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  sharp: true
  # Optional native resolver used by static-analysis tooling. The JavaScript
  # fallback is sufficient here and keeps installs reproducible in CI.
  unrs-resolver: false

overrides:
  dompurify: 3.4.11
  postcss: 8.5.19

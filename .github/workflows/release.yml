name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATABASE_URL: postgresql://mcpops:release_test_password@localhost:5432/mcp_ops_studio?schema=public
      MCP_OPS_MASTER_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "Release tags must use SemVer, for example v1.2.3 or v1.2.3-rc.1" >&2
            exit 1
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Validate Prisma schema
        run: pnpm exec prisma validate --schema prisma/schema.prisma

      - name: Run unit tests
        run: pnpm test

      - name: Build workspace and documentation
        run: |
          pnpm -r --workspace-concurrency=4 build
          pnpm docs:build

      - name: Validate Compose files
        env:
          MCP_OPS_VERSION: ${{ github.ref_name }}
          POSTGRES_ADMIN_PASSWORD: 11111111111111111111111111111111
          POSTGRES_PASSWORD: 22222222222222222222222222222222
          SESSION_SECRET: 3333333333333333333333333333333333333333333333333333333333333333
          CSRF_SECRET: 4444444444444444444444444444444444444444444444444444444444444444
          INTERNAL_API_TOKEN: 5555555555555555555555555555555555555555555555555555555555555555
          SEED_ADMIN_EMAIL: release-admin@example.com
          SEED_ADMIN_PASSWORD: 66666666666666666666666666666666
          SEED_MCP_API_KEY: 77777777777777777777777777777777
          SEED_PRODUCTION_MCP_API_KEY: 88888888888888888888888888888888
          PUBLIC_CONTROL_PLANE_URL: https://mcpops.example.com
          PUBLIC_RUNTIME_URL: https://mcpops.example.com
        run: |
          docker compose -f infra/docker-compose.yml config --quiet
          docker compose -f infra/docker-compose.release.yml config --quiet

      - name: Check whitespace errors
        run: git diff --check

  integration:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      MCP_OPS_MASTER_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      SESSION_SECRET: github-actions-development-session-secret
      INTERNAL_API_TOKEN: github-actions-internal-token
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Compose stack
        run: docker compose -f infra/docker-compose.yml up --build --detach --wait --scale worker=2

      - name: Run vertical-slice integration test
        run: pnpm test:e2e

      - name: Show service logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.yml logs --no-color

      - name: Stop Compose stack
        if: always()
        run: docker compose -f infra/docker-compose.yml down --volumes --remove-orphans

  images:
    needs: [verify, integration]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        app: [control-plane, worker, migrate]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/fabian-arnold/mcpopsstudio-${{ matrix.app }}
          tags: type=raw,value=${{ github.ref_name }}
          labels: |
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          build-args: APP=${{ matrix.app }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=release-${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.app }}

  compose-bundle:
    needs: [verify, integration]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build Compose installation bundle
        shell: bash
        run: |
          bundle="mcp-ops-studio-${GITHUB_REF_NAME}"
          mkdir -p "release/${bundle}/postgres-init"
          cp infra/docker-compose.release.yml "release/${bundle}/"
          cp infra/docker-compose.container-executor.yml "release/${bundle}/"
          cp infra/mcp-ops-studio.env.example "release/${bundle}/"
          cp infra/postgres-init/00-security.sh "release/${bundle}/postgres-init/"
          tar -C release -czf "release/${bundle}.tar.gz" "${bundle}"
          cd release
          sha256sum "${bundle}.tar.gz" > SHA256SUMS

      - name: Upload Compose installation bundle
        uses: actions/upload-artifact@v4
        with:
          name: compose-release-assets
          path: |
            release/*.tar.gz
            release/SHA256SUMS
          if-no-files-found: error

  publish:
    needs: [images, compose-bundle]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download Compose installation bundle
        uses: actions/download-artifact@v4
        with:
          name: compose-release-assets
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release-assets/*.tar.gz
            release-assets/SHA256SUMS

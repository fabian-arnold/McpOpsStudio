name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://mcpops:mcpops_dev_password@localhost:5432/mcp_ops_studio?schema=public
      MCP_OPS_MASTER_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Validate Prisma schema
        run: pnpm exec prisma validate --schema prisma/schema.prisma

      - name: Run unit tests
        run: pnpm test

      - name: Build workspace
        run: pnpm -r --workspace-concurrency=4 build

      - name: Validate Compose configuration
        env:
          MCP_OPS_VERSION: v0.0.0-ci
          POSTGRES_ADMIN_PASSWORD: 11111111111111111111111111111111
          POSTGRES_PASSWORD: 22222222222222222222222222222222
          SESSION_SECRET: 3333333333333333333333333333333333333333333333333333333333333333
          CSRF_SECRET: 4444444444444444444444444444444444444444444444444444444444444444
          INTERNAL_API_TOKEN: 5555555555555555555555555555555555555555555555555555555555555555
          SEED_ADMIN_EMAIL: release-admin@example.com
          SEED_ADMIN_PASSWORD: 66666666666666666666666666666666
          SEED_MCP_API_KEY: 77777777777777777777777777777777
          SEED_PRODUCTION_MCP_API_KEY: 88888888888888888888888888888888
          PUBLIC_CONTROL_PLANE_URL: https://mcpops.example.com
          PUBLIC_RUNTIME_URL: https://mcpops.example.com
        run: |
          docker compose -f infra/docker-compose.yml config --quiet
          docker compose -f infra/docker-compose.release.yml config --quiet

      - name: Check whitespace errors
        run: git diff --check

  integration:
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 25
    env:
      MCP_OPS_MASTER_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      SESSION_SECRET: github-actions-development-session-secret
      INTERNAL_API_TOKEN: github-actions-internal-token
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Compose stack
        run: docker compose --profile demo -f infra/docker-compose.yml up --build --detach --wait --scale worker=2

      - name: Run vertical-slice integration test
        run: pnpm test:e2e

      - name: Show service logs on failure
        if: failure()
        run: docker compose --profile demo -f infra/docker-compose.yml logs --no-color

      - name: Stop Compose stack
        if: always()
        run: docker compose --profile demo -f infra/docker-compose.yml down --volumes --remove-orphans

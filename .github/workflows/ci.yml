name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://mcpops:mcpops_dev_password@localhost:5432/mcp_ops_studio?schema=public
      MCP_OPS_MASTER_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.13.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Turbo cache
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Validate Prisma schema
        run: pnpm exec prisma validate --schema prisma/schema.prisma

      - name: Check formatting
        run: pnpm format:check

      - name: Lint source
        run: pnpm lint

      - name: Analyze dependencies and architecture
        run: pnpm analyze

      - name: Type-check workspace
        run: pnpm typecheck

      - name: Run unit tests
        run: pnpm test

      - name: Test installation and repository tooling
        run: pnpm config:test

      - name: Build workspace
        run: pnpm build

      - name: Validate Compose configuration
        shell: bash
        run: |
          docker compose -f infra/docker-compose.yml config --quiet
          sed "s/__MCP_OPS_VERSION__/v0.0.0-ci/g" infra/docker-compose.release.yml > "${RUNNER_TEMP}/compose.yaml"
          docker compose -f "${RUNNER_TEMP}/compose.yaml" config --quiet

      - name: Check whitespace errors
        run: git diff --check

  integration:
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 25
    env:
      MCP_OPS_MASTER_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      SESSION_SECRET: github-actions-development-session-secret
      INTERNAL_API_TOKEN: github-actions-internal-token
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.13.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build cached Compose images
        run: |
          docker buildx bake --allow=fs.read=.. -f infra/docker-compose.yml \
            --set control-plane.tags=mcp-ops-studio-control-plane \
            --set control-plane.cache-from=type=gha,scope=ci-control-plane \
            --set control-plane.cache-to=type=gha,mode=max,scope=ci-control-plane \
            --set control-plane.output=type=docker \
            --set worker.tags=mcp-ops-studio-worker \
            --set worker.cache-from=type=gha,scope=ci-worker \
            --set worker.cache-to=type=gha,mode=max,scope=ci-worker \
            --set worker.output=type=docker \
            --set migrate.tags=mcp-ops-studio-migrate \
            --set migrate.cache-from=type=gha,scope=ci-migrate \
            --set migrate.cache-to=type=gha,mode=max,scope=ci-migrate \
            --set migrate.output=type=docker

      - name: Start Compose stack
        run: docker compose --profile demo -f infra/docker-compose.yml up --no-build --detach --wait --scale worker=2

      - name: Run vertical-slice integration test
        run: pnpm test:e2e

      - name: Show service logs on failure
        if: failure()
        run: docker compose --profile demo -f infra/docker-compose.yml logs --no-color

      - name: Stop Compose stack
        if: always()
        run: docker compose --profile demo -f infra/docker-compose.yml down --volumes --remove-orphans
